<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Lampiran Generator</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for JSX compilation in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [file, setFile] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [processedUrl, setProcessedUrl] = useState(null);
      const [processedBytes, setProcessedBytes] = useState(null);
      const [error, setError] = useState('');
      const [libsLoaded, setLibsLoaded] = useState(false);
      const [isDragging, setIsDragging] = useState(false);
      const fileInputRef = useRef(null);
      const previewContainerRef = useRef(null);

      // Load PDF processing libraries via CDN
      useEffect(() => {
        let pdfLibLoaded = false;
        let pdfjsLoaded = false;

        const checkReady = () => {
          if (pdfLibLoaded && pdfjsLoaded) setLibsLoaded(true);
        };

        const scriptPdfLib = document.createElement('script');
        scriptPdfLib.src = 'https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js';
        scriptPdfLib.onload = () => { pdfLibLoaded = true; checkReady(); };
        document.body.appendChild(scriptPdfLib);

        const scriptPdfJs = document.createElement('script');
        scriptPdfJs.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
        scriptPdfJs.onload = () => {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
          pdfjsLoaded = true;
          checkReady();
        };
        document.body.appendChild(scriptPdfJs);

        return () => {
          if (processedUrl) URL.revokeObjectURL(processedUrl);
        };
      }, []);

      const handleFileSelection = (selectedFile) => {
        if (selectedFile && selectedFile.type === 'application/pdf') {
          setFile(selectedFile);
          setProcessedUrl(null);
          setProcessedBytes(null);
          setError('');
        } else {
          setError('Mohon unggah file PDF yang valid.');
          setFile(null);
        }
      };

      const handleFileChange = (e) => handleFileSelection(e.target.files[0]);
      const onDragOver = (e) => e.preventDefault();
      const onDragEnter = (e) => { e.preventDefault(); setIsDragging(true); };
      const onDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
      const onDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          handleFileSelection(e.dataTransfer.files[0]);
        }
      };

      const clearFile = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setFile(null);
        setProcessedUrl(null);
        setProcessedBytes(null);
        setError('');
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      const processPdf = async () => {
        if (!file || !libsLoaded) return;
        setIsProcessing(true);
        setError('');

        try {
          const arrayBuffer = await file.arrayBuffer();
          const pdfjs = window.pdfjsLib;
          const pdfDoc = await pdfjs.getDocument({ data: arrayBuffer }).promise;
          
          const modifications = [];

          for (let i = 1; i <= pdfDoc.numPages; i++) {
            const page = await pdfDoc.getPage(i);
            const viewport = page.getViewport({ scale: 1 });
            const textContent = await page.getTextContent();
            const pageHeight = viewport.height;
            const pageWidth = viewport.width;

            const items = textContent.items.map(item => ({
              text: item.str,
              x: item.transform[4],
              y: Math.round(item.transform[5])
            }));

            // Gabungkan teks berdasarkan sumbu Y (Baris)
            const lines = [];
            items.forEach(item => {
              if (!item.text || item.text.trim() === '') return;
              let existingLine = lines.find(l => Math.abs(l.y - item.y) < 5);
              if (existingLine) {
                existingLine.items.push(item);
                existingLine.y = Math.max(existingLine.y, item.y);
              } else {
                lines.push({ items: [item], y: item.y });
              }
            });

            let tableTitleY = null;     
            let headerY = null;
            let lowestJumlahY = null;
            let signatureYCandidates = [];

            lines.forEach(line => {
              line.items.sort((a, b) => a.x - b.x);
              const fullText = line.items.map(i => i.text.trim()).join(' ');
              const cleanText = fullText.toLowerCase().replace(/\s+/g, '');
              const lowerText = fullText.toLowerCase().trim();
              const y = line.y;

              // 1. Deteksi Judul Tabel (Penting untuk dipertahankan)
              if (cleanText.includes("daftarbarang") || cleanText.includes("miliknegarapada")) {
                if (tableTitleY === null || y > tableTitleY) {
                  tableTitleY = y;
                }
              }

              // 2. Deteksi Header Lampiran (Akan Dihapus dari Atas)
              if (cleanText.includes("lampiran") || cleanText.includes("keputusanmenteri") || cleanText.includes("nomor")) {
                 // Pastikan posisi header wajar (di bagian atas halaman)
                 if (y > pageHeight * 0.5) {
                     if (headerY === null || y < headerY) headerY = y;
                 }
              }

              // 3. Deteksi Akhir Tabel (Jumlah) sebagai Pelindung Bawah Tabel
              if (cleanText.includes("jumlah") && !cleanText.includes("halaman")) {
                 if (lowestJumlahY === null || y < lowestJumlahY) {
                     lowestJumlahY = y;
                 }
              }

              // 4. Deteksi Jangkar Tanda Tangan (Sangat Robust dan Mutlak)
              // Menghapus regex lama yang salah mendeteksi pecahan kata "an" (seperti dari "Bangunan")
              const isAnStandalone = lowerText === "a.n." || lowerText === "a.n";
              const hasAnMenteri = cleanText.includes("a.nmenteri") || cleanText.includes("an.menteri") || cleanText.includes("a.nkepala");
              const hasMenteriKeuangan = cleanText.includes("menterikeuangan") && !cleanText.includes("keputusan") && !cleanText.includes("kementerian");
              const hasKepalaKantor = cleanText.includes("kepalakantorpelayanan");
              const hasDitandatangani = cleanText.includes("ditandatanganisecara");
              const hasGamal = cleanText.includes("gamalhanif");
              const hasArimbawa = cleanText.includes("arimbawa");

              if (isAnStandalone || hasAnMenteri || hasMenteriKeuangan || hasKepalaKantor || hasDitandatangani || hasGamal || hasArimbawa) {
                signatureYCandidates.push(y);
              }
            });

            // Filter Jangkar agar tidak memakan judul / isi tabel secara keliru
            let signatureAnchorY = null;
            let validSignatureYs = signatureYCandidates.filter(sy => {
                if (tableTitleY !== null && sy > tableTitleY - 40) return false;
                if (headerY !== null && sy > headerY - 40) return false;
                if (lowestJumlahY !== null && sy > lowestJumlahY - 5) return false;
                return true;
            });

            if (validSignatureYs.length > 0) {
                signatureAnchorY = Math.max(...validSignatureYs);
            }

            const rects = [];

            // REDAKSI HEADER:
            if (headerY !== null || tableTitleY !== null) {
              let redactionBottom;
              if (tableTitleY !== null) {
                redactionBottom = tableTitleY + 15; // Berhenti 15 poin di atas judul
              } else if (headerY !== null) {
                redactionBottom = headerY - 15;
              } else {
                redactionBottom = pageHeight;
              }

              if (redactionBottom < pageHeight) {
                rects.push({ 
                  x: 0, 
                  y: redactionBottom, 
                  width: pageWidth, 
                  height: pageHeight - redactionBottom 
                });
              }
            }
            
            // REDAKSI FOOTER / TANDA TANGAN:
            let redactionTop = 40; // Default: Bersihkan nomor halaman

            if (signatureAnchorY !== null) {
              // Margin dikembalikan ke +22. Cukup untuk menutupi teks tanda tangan
              // namun tidak akan over-reaching dan menelan tabel di atasnya!
              redactionTop = Math.max(redactionTop, signatureAnchorY + 22); 
            }

            // Lapis Keamanan 1: JUMLAH
            if (lowestJumlahY !== null && redactionTop > lowestJumlahY - 4) {
              redactionTop = lowestJumlahY - 4;
            }

            // Lapis Keamanan 2: Judul Tabel
            if (tableTitleY !== null && redactionTop > tableTitleY - 20) {
              redactionTop = tableTitleY - 20;
            }

            if (redactionTop > 0) {
              rects.push({ 
                x: 0, 
                y: 0, 
                width: pageWidth, 
                height: redactionTop 
              });
            }

            modifications.push({ pageIndex: i - 1, rects });
          }

          // Terapkan kotak putih ke file asli
          const { PDFDocument, rgb } = window.PDFLib;
          const finalPdfDoc = await PDFDocument.load(arrayBuffer);

          for (const mod of modifications) {
            const page = finalPdfDoc.getPage(mod.pageIndex);
            for (const rect of mod.rects) {
              page.drawRectangle({
                x: rect.x, 
                y: rect.y, 
                width: rect.width, 
                height: rect.height, 
                color: rgb(1, 1, 1), 
              });
            }
          }

          const modifiedPdfBytes = await finalPdfDoc.save();
          const blob = new Blob([modifiedPdfBytes], { type: 'application/pdf' });
          const url = URL.createObjectURL(blob);
          
          setProcessedUrl(url);
          setProcessedBytes(modifiedPdfBytes);

        } catch (err) {
          console.error("Processing Error:", err);
          setError("Gagal memproses PDF. Silakan coba lagi.");
        } finally {
          setIsProcessing(false);
        }
      };

      useEffect(() => {
        if (!processedBytes || !previewContainerRef.current) return;
        
        let isMounted = true;
        const renderPreview = async () => {
          const container = previewContainerRef.current;
          container.innerHTML = ''; 

          try {
            const pdfjs = window.pdfjsLib;
            const pdf = await pdfjs.getDocument({ data: processedBytes }).promise;
            const maxPages = Math.min(pdf.numPages, 3);

            for (let i = 1; i <= maxPages; i++) {
              if (!isMounted) break;
              const page = await pdf.getPage(i);
              const viewport = page.getViewport({ scale: 1.2 });
              const canvas = document.createElement('canvas');
              canvas.className = 'mb-6 shadow-lg rounded border border-gray-200 bg-white';
              canvas.style.width = "100%";
              canvas.style.maxWidth = "800px";
              
              const context = canvas.getContext('2d');
              canvas.height = viewport.height;
              canvas.width = viewport.width;
              
              container.appendChild(canvas);
              await page.render({ canvasContext: context, viewport }).promise;
            }

            if (isMounted && pdf.numPages > 3) {
              const note = document.createElement('div');
              note.className = 'text-center p-4 text-emerald-800 font-medium';
              note.innerText = `+ ${pdf.numPages - 3} halaman lainnya tersedia di file unduhan.`;
              container.appendChild(note);
            }
          } catch (err) {
            console.error(err);
          }
        };

        renderPreview();
        return () => { isMounted = false; };
      }, [processedBytes]);

      return (
        <div className="flex flex-col items-center py-10 px-4 sm:px-6 min-h-screen bg-slate-50 font-sans">
          
          <style>{`
            .custom-scrollbar::-webkit-scrollbar { width: 6px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
            .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
            @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
          `}</style>

          <div className="max-w-3xl w-full bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
            <div className="text-center mb-8">
              <div className="inline-block p-3 bg-emerald-100 text-emerald-600 rounded-2xl mb-4">
                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
              </div>
              <h2 className="text-3xl font-bold text-slate-900">PDF Lampiran Generator</h2>
              <p className="text-slate-600 mt-2">Menghapus Lampiran & Tanda Tangan.</p>
            </div>

            <div 
              onDragOver={onDragOver} onDragEnter={onDragEnter} onDragLeave={onDragLeave} onDrop={onDrop}
              className={`relative group cursor-pointer border-2 border-dashed rounded-2xl p-10 text-center transition-all ${
                isDragging ? 'border-emerald-500 bg-emerald-50 scale-[1.01]' : 'border-slate-300 hover:border-emerald-400 hover:bg-slate-50'
              }`}
              onClick={() => fileInputRef.current.click()}
            >
              <input type="file" accept=".pdf" className="hidden" ref={fileInputRef} onChange={handleFileChange} />
              
              <div className="space-y-4">
                <svg className={`mx-auto h-12 w-12 ${file ? 'text-emerald-500' : 'text-slate-400'}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                <div className="text-slate-700 font-medium">
                  {file ? file.name : 'Klik atau seret file PDF ke sini'}
                </div>
                <p className="text-xs text-slate-500">Hanya file PDF (Maks. 10MB)</p>
              </div>

              {file && (
                <button 
                  onClick={clearFile}
                  className="absolute top-4 right-4 p-2 bg-white text-slate-400 hover:text-red-500 rounded-full shadow-sm border border-slate-100 transition-colors"
                >
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
              )}
            </div>

            {error && (
              <div className="mt-4 p-4 bg-red-50 border border-red-100 text-red-700 text-sm rounded-xl flex items-center">
                <svg className="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd"></path></svg>
                {error}
              </div>
            )}

            <button
              onClick={processPdf}
              disabled={!file || isProcessing || !libsLoaded}
              className={`mt-8 w-full py-4 px-6 rounded-2xl font-bold text-lg shadow-lg transition-all flex items-center justify-center ${
                !file || isProcessing || !libsLoaded 
                  ? 'bg-slate-200 text-slate-500 cursor-not-allowed' 
                  : 'bg-emerald-600 text-white hover:bg-emerald-700 hover:shadow-emerald-200 active:scale-[0.98]'
              }`}
            >
              {isProcessing ? (
                <>
                  <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                  Memproses...
                </>
              ) : 'Bersihkan Dokumen'}
            </button>

            {processedUrl && (
              <div className="mt-12 space-y-6 animate-fade-in-up">
                <div className="flex items-center justify-between border-b border-slate-100 pb-4">
                  <h3 className="text-xl font-bold text-slate-900">Hasil Pembersihan</h3>
                  <a 
                    href={processedUrl} 
                    download={`${file.name.replace(/\.pdf$/i, '')}-ND.pdf`}
                    className="bg-emerald-100 text-emerald-700 px-6 py-2 rounded-xl font-bold hover:bg-emerald-200 transition-colors flex items-center"
                  >
                    <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download PDF
                  </a>
                </div>
                
                <div className="bg-slate-100 rounded-2xl p-4 h-[600px] overflow-y-auto custom-scrollbar border border-slate-200">
                  <div ref={previewContainerRef} className="flex flex-col items-center">
                    <div className="text-slate-400 mt-20 animate-pulse">Menyiapkan pratinjau...</div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
